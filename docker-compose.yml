services:
  app:
    build:
      context: .
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY}
        VITE_API_URL: /api
    container_name: manage-money-app
    ports:
      - "3333:80"
    restart: unless-stopped
    networks:
      - manage_money_net

networks:
  manage_money_net:
    external: true
